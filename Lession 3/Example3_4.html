<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Многоуровневый список</title>
</head>
<body>
<h1>Разделы курса</h1>
<ol>
    <li>Теги заголовков
        <ul type="square">
            <li>h1</li>
            <li>h2</li>
            <li>h3</li>
            <li>h4</li>
            <li>h5</li>
            <li>h6</li>
        </ul>
    </li>
    <li>Теги списков
        <ul type="circle">
            <li>ul</li>
            <li>ol</li>
            <li>li</li>
        </ul>
    </li>
    <li>Теги форм</li>
</ol>
</body>
</html>
