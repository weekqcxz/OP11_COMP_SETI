<!DOCTYPE html>
<html>
<head>
    <title>Таблица по центру</title>
</head>
<body>
    <table width="600" border="1" align="center" cellspacing="0" cellpadding="5">
        <caption>Пример таблицы</caption>
        <tr>
            <td width="150" valign="top">Содержимое левой колонки.</td>
            <td valign="top">Содержимое правой колонки.</td>
        </tr>
        <tr>
            <td width="150" valign="top">Вторая строка, левая колонка.</td>
            <td valign="top">Вторая строка, правая колонка.</td>
        </tr>
    </table>
</body>
</html>
