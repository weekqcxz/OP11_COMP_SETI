<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Text Decoration</title>
    <link rel="stylesheet" href="Example 4.css">
</head>
<body>
    <div class="box">
        <p class="underline">Это подчеркнутый текст</p>
        <p class="overline">Это надчеркнутый текст</p>
        <p class="line-through">Это зачеркнутый текст</p>
        <p class="both">Это подчеркнутый и зачеркнутый текст</p>
        <p><a href="#">Не подчеркнутая ссылка</a></p>
    </div>
</body>
</html>
