<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Пример: меняем страницу</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .box {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            margin: 20px 0;
            text-align: center;
            line-height: 100px;
        }

        button {
            padding: 8px 16px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h1 id="mainTitle">Заголовок страницы</h1>

    <div class="box" id="colorBox">
        Кликни на кнопку
    </div>

    <button id="changeTextBtn">
        Изменить текст
    </button>

    <button id="changeColorBtn">
        Сменить цвет
    </button>

    <script>
        let title = document.querySelector("#mainTitle");
        let box = document.querySelector("#colorBox");
        let textBtn = document.querySelector("#changeTextBtn");
        let colorBtn = document.querySelector("#changeColorBtn");

        textBtn.onclick = function() {
            title.textContent = "Текст изменён через JavaScript!";
            box.textContent = "Спасибо, что нажали";
        };

        colorBtn.onclick = function() {
            box.style.backgroundColor = "orange";
            box.style.border = "2px solid black";
        };
    </script>

</body>
</html>
